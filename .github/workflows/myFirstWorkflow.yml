name: my-first-workflow
# Trigger this workflow on every push to any branch in the repository
on: 
  push: 
    branches:
      - main     
  pull_request:
    branches:
      - main

jobs:
  unit-tests: 
   name: Running Unit Tests
   runs-on: ubuntu-latest
   steps:
     - name: Checkout code
       uses: actions/checkout@v6.0.3
     - name: Setup Python
       uses: actions/setup-python@v6.2.0
       with:
         python-version: '3.10'
     - name: Install dependencies
       run: |
         python -m pip install --upgrade pip
         pip install -r requirements.txt
     - name: Run Unit Tests
       run: pytest -v
       
   
