name: my-first-workflow
# Trigger this workflow on every push to any branch in the repository
on: push

jobs:
  job1: 
   name: JOB1
   runs-on: ubuntu-latest
   steps:
     - name: Running single command in Job1
       run: echo "Hi, this is my first GitHub workflow."
     - name: checking GitHub OS release for my runner
       run: cat /etc/os-release
     - name: Calling sleep
       run: sleep 20
  job2:
    name: JOB2
    runs-on: ubuntu-latest
    steps:
       - name: Checking the Hostname for Runner
         run: hostname
       - name: Running multiple commands
         run: |
           echo "Hi from Kingsley"
           echo "Current time is `date`"
           sleep 20
           

  
