name: my-first-workflow
# Trigger this workflow on every push to any branch in the repository
on: 
    push: 

jobs:
  job1: 
   name: JOB1
   runs-on: ubuntu-latest
   steps:
     - name: Step-1
       run: |
        pwd
        ls -ltr
        hostname
     - name: Step-2 - Checkout
       uses: actions/checkout@v6.0.3
     - name: Step-3
       run: | 
         echo `pwd` >> myartifact.txt
         mkdir artifacts
         echo `ls -ltr` >> artifacts/list.txt
         echo `hostname` >> artifacts/hostname.txt
     -  name: Upload single file
        uses:  actions/upload-artifact@v7
        with:
          name: single_file
          path: ./myartifact.txt
     - name: Upload from directory
       uses: actions/upload-artifact@v7
       with:
         name: directory_artifacts
         path: artifacts/
     - name: Upload from multiple paths
       uses: actions/upload-artifact@v7
       with:
        name: multiple_paths
        path: |
         ./myartifact.txt
         artifacts/
     - name: Upload from multiple paths with exclusions
       uses: actions/upload-artifact@v7
       with:
        name: multiple_paths_with_exclusions
        path: |
         ./myartifact.txt
         artifacts/
         !**/hostname.txt
         job2: 
          name: JOB2
          runs-on: ubuntu-latest
          steps:
          - name:  checking current directory
             pwd
             ls -ltr
          - name: Download single file artifact
            uses: actions/download-artifact@v7
            with:
            name: single_file
          - name: Checking the current directory post-download
            run: |
             pwd
             ls -ltr
            
           
           
           

           
        
            
          
