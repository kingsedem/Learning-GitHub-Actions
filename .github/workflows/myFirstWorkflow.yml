name: my-first-workflow
# Trigger this workflow on every push to any branch in the repository
on: 
    push: 
     branches:
       - dev
       - "feature-*"
       - main

jobs:
  job1: 
   name: JOB1
   runs-on: ubuntu-latest
   steps:
     - name: Step-1
       run: |
        pwd
        ls -ltr
        hostname
     - name: Step-2 - Checkout
       uses: actions/checkout@v6.0.3
     - name: Step-3
       run: | 
         echo `pwd` >> myartifact.txt
         mkdir artifacts
         echo `ls -ltr` >> artifacts/list.txt
         echo `hostname` >> artifacts/hostname.txt
     -  name: Upload single file
        uses:  actions/upload-artifact@v7
        with:
          name: single_file
          path: ./myartifact.txt
  job2: 
     name: JOB2
     runs-on: ubuntu-latest
     needs: job1
     steps:
       - name: Checking current directory
         run: |
          pwd
          ls -ltr

       - name: Download single file artifact
         uses: actions/download-artifact@v7
         with:
           name: single_file

       - name: Checking the current directory post-download
         run: |
          pwd
          ls -ltr
